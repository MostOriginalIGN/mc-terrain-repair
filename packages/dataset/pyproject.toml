[build-system]
requires = ["setuptools>=82"]
build-backend = "setuptools.build_meta"

[project]
name = "mc-terrain-dataset"
version = "0.1.0"
description = "Shared schema helpers for Minecraft terrain datasets"
requires-python = ">=3.10,<3.15"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
