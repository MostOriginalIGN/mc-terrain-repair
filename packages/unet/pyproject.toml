[build-system]
requires = ["setuptools>=82"]
build-backend = "setuptools.build_meta"

[project]
name = "mc-terrain-unet"
version = "0.1.0"
description = "Minecraft surface terrain export and deterministic U-Net repair for Vanilla-style infill."
requires-python = ">=3.11,<3.15"
dependencies = [
    "torch",
    "lightning==2.6.1",
    "litlogger>=2026.5.12",
    "tensorboard",
    "numpy",
    "tqdm",
    "mc-terrain-exporter",
    "mc-terrain-dataset",
]

[project.optional-dependencies]
dev = ["pytest"]
onnx = ["onnx", "onnxruntime", "onnxscript"]

[project.scripts]
train-terrain-repair = "unet.repair_lightning:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
