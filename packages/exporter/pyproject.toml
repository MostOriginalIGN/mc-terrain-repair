[build-system]
requires = ["setuptools>=82"]
build-backend = "setuptools.build_meta"

[project]
name = "mc-terrain-exporter"
version = "0.1.0"
description = "Surface anchored Minecraft terrain exporter"
requires-python = ">=3.11,<3.15"
dependencies = [
    "anvil-parser2",
    "numpy",
    "matplotlib",
    "pillow",
    "tqdm",
    "mc-terrain-dataset",
]

[project.optional-dependencies]
dev = ["pytest"]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
